<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 190">
  <defs>
    <clipPath id="circle-ec">
      <circle cx="148" cy="148" r="36"/>
    </clipPath>
  </defs>

  <!-- E - yellow/gold -->
  <text x="-6" y="118" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#FFD100" opacity="0.95">E</text>

  <!-- C - orange -->
  <text x="50" y="130" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#F47B3E" opacity="0.82">C</text>

  <!-- Circle - cyan with Ecuador flag -->
  <circle cx="148" cy="148" r="36" fill="#3AB8D4"/>
  <g clip-path="url(#circle-ec)">
    <!-- Ecuador flag: yellow (top half), blue (middle), red (bottom) -->
    <rect x="112" y="126" width="72" height="44" fill="#EF3340"/>
    <rect x="112" y="126" width="72" height="22" fill="#FFD100"/>
    <rect x="112" y="141" width="72" height="11" fill="#003087"/>
    <!-- Simplified coat of arms circle -->
    <circle cx="148" cy="141" r="7" fill="#FFD100" stroke="#003087" stroke-width="1"/>
  </g>
</svg>
