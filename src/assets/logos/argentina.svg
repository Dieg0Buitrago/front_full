<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 190">
  <defs>
    <clipPath id="circle-ar">
      <circle cx="148" cy="148" r="36"/>
    </clipPath>
  </defs>

  <!-- A - crimson -->
  <text x="-4" y="118" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#E8305A" opacity="0.95">A</text>

  <!-- R - orange, offset right and down slightly -->
  <text x="54" y="130" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#F47B3E" opacity="0.82">R</text>

  <!-- Circle (O) - cyan, bottom right, with Argentina flag -->
  <circle cx="148" cy="148" r="36" fill="#74ACDF"/>
  <g clip-path="url(#circle-ar)">
    <rect x="112" y="126" width="72" height="44" fill="white"/>
    <rect x="112" y="126" width="72" height="15" fill="#74ACDF"/>
    <rect x="112" y="155" width="72" height="15" fill="#74ACDF"/>
    <!-- Sun -->
    <circle cx="148" cy="148" r="8" fill="#F6B40E"/>
    <line x1="148" y1="136" x2="148" y2="132" stroke="#F6B40E" stroke-width="2"/>
    <line x1="148" y1="160" x2="148" y2="164" stroke="#F6B40E" stroke-width="2"/>
    <line x1="136" y1="148" x2="132" y2="148" stroke="#F6B40E" stroke-width="2"/>
    <line x1="160" y1="148" x2="164" y2="148" stroke="#F6B40E" stroke-width="2"/>
  </g>
</svg>
