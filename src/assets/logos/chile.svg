<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 190">
  <defs>
    <clipPath id="circle-ch">
      <circle cx="148" cy="148" r="36"/>
    </clipPath>
  </defs>

  <!-- C - crimson -->
  <text x="-8" y="118" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#E8305A" opacity="0.95">C</text>

  <!-- H - orange -->
  <text x="50" y="130" font-family="'Arial Black','Impact',sans-serif" font-size="118" font-weight="900" fill="#F47B3E" opacity="0.82">H</text>

  <!-- Circle - purple/blue with Chile flag -->
  <circle cx="148" cy="148" r="36" fill="#3AB8D4"/>
  <g clip-path="url(#circle-ch)">
    <!-- Chile flag: top half red, bottom half white, blue square top-left -->
    <rect x="112" y="126" width="72" height="44" fill="white"/>
    <rect x="112" y="126" width="72" height="22" fill="#D52B1E"/>
    <rect x="112" y="126" width="28" height="22" fill="#0039A6"/>
    <!-- Star -->
    <polygon points="126,131 127.8,136.4 133.5,136.4 129,139.6 130.8,145 126,141.8 121.2,145 123,139.6 118.5,136.4 124.2,136.4" fill="white"/>
  </g>
</svg>
